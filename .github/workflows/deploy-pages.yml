name: Deploy website to GitHub Pages

# Publishes the site to a live link and re-publishes on every update.
on:
  push:
    branches:
      - main
      - claude/website-rebuild-company-profile-tfogym
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (GitHub Actions build) automatically if not already on.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repository root (index.html + assets/).
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
